# TEST/DEMO-ONLY Garage config. One-node sqlite layout mirroring
# `varve-testkit::backends::GARAGE_TOML` (the same layout the CI backend
# matrix exercises). `rpc_secret` is fixed test-rig material, NOT a real
# secret — it exists only so this single-node demo cluster forms.
metadata_dir = "/var/lib/garage/meta"
data_dir = "/var/lib/garage/data"
db_engine = "sqlite"
replication_factor = 1
rpc_bind_addr = "[::]:3901"
# Compose service name, so the one-shot `garage-init` node's CLI reaches this
# node's RPC port to run the layout/bucket/key dance.
rpc_public_addr = "garage:3901"
rpc_secret = "1799bccfd7411eddcf9ebd316bc1f5287ad12a68094e1c6ac6abde7e6feae1ec"

[s3_api]
s3_region = "garage"
api_bind_addr = "[::]:3900"
root_domain = ".s3.garage.localhost"

[s3_web]
bind_addr = "[::]:3902"
root_domain = ".web.garage.localhost"
index = "index.html"

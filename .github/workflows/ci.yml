name: CI
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 3 * * *"
    - cron: "0 4 * * 1" # weekly: Ceph demo backend
    - cron: "0 5 * * *" # nightly: chaos harness

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_PROFILE_DEV_DEBUG: "0"
  CARGO_PROFILE_TEST_DEBUG: "0"

jobs:
  check:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 -m unittest scripts/test_ci.py
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tck-report
          path: |
            target/tck-report.json
            target/tck-outcomes.tsv
          if-no-files-found: error

  docs:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install mdbook --locked --version 0.5.4
      - run: mdbook build docs/book

  gql-differential:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: python3 -m unittest scripts/gql_diff/test_compare.py
      - run: curl -fsSLo /tmp/antlr-4.13.2-complete.jar https://www.antlr.org/download/antlr-4.13.2-complete.jar
      - run: mkdir -p target/gql-diff/generated target/gql-diff/classes
      - run: |
          java -jar /tmp/antlr-4.13.2-complete.jar \
            -Dlanguage=Java \
            -o ../../target/gql-diff/generated \
            GQL.g4
        working-directory: resources/gql-grammar
      - run: |
          javac \
            -cp /tmp/antlr-4.13.2-complete.jar \
            -d target/gql-diff/classes \
            target/gql-diff/generated/*.java \
            scripts/gql_diff/Main.java
      - run: |
          if java \
            -cp /tmp/antlr-4.13.2-complete.jar:target/gql-diff/classes \
            Main \
            /tmp/definitely-not-a-gql-file.gql > target/gql-diff/missing.tsv; then
            echo "expected missing corpus file to fail" >&2
            cat target/gql-diff/missing.tsv >&2
            exit 1
          fi
      - run: |
          cargo run -p varve-testkit --bin parse_corpus -- \
            resources/gql-corpus/*.gql > target/gql-diff/varve.tsv
      - run: |
          java \
            -cp /tmp/antlr-4.13.2-complete.jar:target/gql-diff/classes \
            Main \
            resources/gql-corpus/*.gql > target/gql-diff/antlr.tsv
      - run: |
          python3 scripts/gql_diff/compare.py \
            target/gql-diff/varve.tsv \
            target/gql-diff/antlr.tsv

  property-nightly:
    if: github.event_name == 'schedule' && github.event.schedule == '0 3 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p varve-testkit --release
        env:
          PROPTEST_CASES: "200000"

  chaos-nightly:
    if: github.event_name == 'schedule' && github.event.schedule == '0 5 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p varve-testkit --release --test chaos -- --nocapture
        env:
          VARVE_CHAOS_SECS: "1800"

  fuzz-nightly:
    if: github.event_name == 'schedule' && github.event.schedule == '0 3 * * *'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: parse
            secs: 600
          - target: log_record
            secs: 300
          - target: manifest
            secs: 300
          - target: block_meta
            secs: 300
          - target: events
            secs: 300
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-fuzz --locked
      # Varve's arrow-IPC decoders may lazily over-reserve (never-touched) buffers on adversarial input while returning clean errors; gate on RSS (real memory), not on allocation request-size.
      # NOTE: libFuzzer treats -malloc_limit_mb=0 as "inherit -rss_limit_mb", so 0 does NOT disable the single-malloc hook. We raise it to 1 TiB to effectively unbound the request-size hook while -rss_limit_mb=4096 remains the real (touched-memory) gate.
      - run: cargo +nightly fuzz run ${{ matrix.target }} -- -max_total_time=${{ matrix.secs }} -rss_limit_mb=4096 -malloc_limit_mb=1048576
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: fuzz/artifacts

  crash-matrix:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p varve-testkit --release --test crash_recovery
        env:
          VARVE_CRASH_ITERS: "100"

  backend-matrix:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend: [garage, seaweedfs, minio]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p varve-testkit --test backend_matrix -- --nocapture
        env:
          VARVE_S3_BACKENDS: ${{ matrix.backend }}

  backend-ceph-weekly:
    if: github.event_name == 'schedule' && github.event.schedule == '0 4 * * 1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p varve-testkit --test backend_matrix ceph -- --nocapture
        env:
          VARVE_S3_BACKENDS: ceph

  container-image:
    # The distroless `varved` image must keep building with the committed
    # lockfile. The full Compose demo stays explicit/local (`just compose-demo`);
    # the backend matrix already exercises live Garage in CI.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build --tag varve-ci .

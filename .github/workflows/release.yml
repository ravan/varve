name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            cross: false
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - if: matrix.cross
        run: cargo install cross --locked
      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CARGO=cargo
          if [ "${{ matrix.cross }}" = "true" ]; then CARGO=cross; fi
          sh scripts/package_release.sh "${{ matrix.target }}" "$VERSION" "$CARGO"
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" --verify-tag --draft --title "$GITHUB_REF_NAME" 2>/dev/null || true
          gh release upload "$GITHUB_REF_NAME" dist/* --clobber

  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Build and push
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          docker build --tag "$IMAGE:$GITHUB_REF_NAME" --tag "$IMAGE:latest" .
          docker push "$IMAGE:$GITHUB_REF_NAME"
          docker push "$IMAGE:latest"
